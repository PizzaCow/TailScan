<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailScan — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e2e8f0;
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px;
    padding: 40px; width: 360px;
  }
  .logo { font-size: 32px; text-align: center; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #7c85a2; text-align: center; margin-bottom: 28px; }
  label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid #2d3148; background: #0f1117; color: #e2e8f0;
    font-size: 14px; outline: none; transition: border 0.15s;
  }
  input[type=password]:focus { border-color: #5b6ee8; }
  button {
    width: 100%; margin-top: 16px; padding: 11px;
    background: #5b6ee8; color: white; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #4a5cd6; }
  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #f87171; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px; text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔍</div>
  <h1>TailScan</h1>
  <p class="subtitle">Tailscale LAN Scanner</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="Enter password">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
