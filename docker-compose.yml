services:

  tailscan:
    build: .
    container_name: tailscan
    restart: unless-stopped
    networks:
      - tailscan-net
    ports:
      - "6226:6226"
    volumes:
      - /run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - tailscan-cache:/tmp/tailscan-cache
    env_file: .env
    environment:
      - CACHE_DIR=/tmp/tailscan-cache
      - GUAC_URL=http://guacamole:8080/guacamole
      - PORT=6226

  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: unless-stopped
    networks:
      - tailscan-net

  postgres:
    image: postgres:16-alpine
    container_name: guac-postgres
    restart: unless-stopped
    networks:
      - tailscan-net
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - guac-pgdata:/var/lib/postgresql/data
      - ./guacamole/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    networks:
      - tailscan-net
    depends_on:
      - guacd
      - postgres
    ports:
      - "6225:8080"
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: guac-postgres
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  tailscan-cache:
  guac-pgdata:

networks:
  tailscan-net:
    internal: false
